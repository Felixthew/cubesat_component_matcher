<!DOCTYPE html>
<html>
<head>
  <title>System Selector</title>
  <script>
    async function fetchSchemas() {
      const res = await fetch("http://localhost:5000/schemas");
      const schemas = await res.json();
      const dropdown = document.getElementById("schemas");
      dropdown.innerHTML = "<option selected disabled>-- Choose a schema --</option>";
      schemas.forEach(schema => {
        const opt = document.createElement("option");
        opt.value = schema;
        opt.text = schema;
        dropdown.appendChild(opt);
      });
    }

    async function fetchSystems() {
      const schema = document.getElementById("schemas").value;
      const res = await fetch(`http://localhost:5000/systems?schema=${schema}`);
      const systems = await res.json();
      const dropdown = document.getElementById("systems");
      dropdown.innerHTML = "<option selected disabled>-- Choose a system --</option>";
      systems.forEach(system => {
        const opt = document.createElement("option");
        opt.value = system;
        opt.text = system;
        dropdown.appendChild(opt);
      });
    }

    async function fetchColumns() {
      const schema = document.getElementById("schemas").value;
      const system = document.getElementById("systems").value;
      const res = await fetch(`http://localhost:5000/parameters?schema=${schema}&table=${system}`);
      const columns = await res.json();
      const list = document.getElementById("columns");
      list.innerHTML = columns.map(c => `<li>${c}</li>`).join("");
    }

    window.onload = fetchSchemas;
  </script>
</head>
<body>
  <h2>Test Interface</h2>

  <label for="schemas">Subsystem Schema:</label>
  <select id="schemas" onchange="fetchSystems()"></select><br><br>

  <label for="systems">System Table:</label>
  <select id="systems" onchange="fetchColumns()"></select><br><br>

  <strong>Available Columns:</strong>
  <ul id="columns"></ul>
</body>
</html>
