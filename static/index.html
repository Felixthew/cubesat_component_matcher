<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Component Matcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .content {
            padding: 2rem;
        }

        .section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            background: #f9fafb;
        }

        .section h2 {
            color: #1f2937;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #374151;
        }

        select, input, button {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        button {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transform: translateY(0);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .specs-container {
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 1rem;
            background: white;
        }

        .spec-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            align-items: end;
        }

        .remove-btn {
            width: auto;
            padding: 0.5rem;
            background: #ef4444;
            font-size: 0.8rem;
        }

        .add-btn {
            background: #10b981;
            margin-top: 0.5rem;
        }

        .results {
            margin-top: 2rem;
        }

        .score-cell {
            font-weight: bold;
            color: #059669;
            background-color: #ecfdf5;
        }

        .loading-indicator {
            display: none;
            text-align: center;
            padding: 1rem;
            color: #6b7280;
            font-style: italic;
        }

        .loading-indicator.show {
            display: block;
        }

        .spec-value-container {
            position: relative;
        }

        .spec-search-input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
        }

        .spec-search-input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .spec-multi-select {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            z-index: 100;
            background: white;
            border: 1px solid #d1d5db;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: none;
        }

        .spec-multi-option {
            padding: 0.5rem;
            cursor: pointer;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .spec-multi-option:hover {
            background: #f3f4f6;
        }

        .spec-multi-option:last-child {
            border-bottom: none;
        }

        .spec-multi-option input[type="checkbox"] {
            width: auto;
            height: auto;
            padding: 0;
            margin: 0;
        }

        .spec-selected-items {
            display: none;
        }

        .spec-selected-tag {
            background: #e0e7ff;
            color: #3730a3;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .spec-selected-tag button {
            background: none;
            border: none;
            color: #3730a3;
            cursor: pointer;
            padding: 0;
            width: auto;
            font-size: 0.7rem;
            line-height: 1;
        }

        .results-table-container {
            overflow-x: auto;
            overflow-y: visible;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
        }

        .results-table {
            width: max-content;
            min-width: 100%;
            border-collapse: collapse;
            background: white;
            margin: 0;
        }

        .results-table th,
        .results-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }

        .results-table th {
            background: #f3f4f6;
            font-weight: 600;
            color: #374151;
        }

        .results-table tr:hover {
            background: #f9fafb;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #6b7280;
        }

        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        .hidden {
            display: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .filter-item {
            margin-bottom: 1rem;
        }

        .filter-controls-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            align-items: center;
        }

        .filter-controls-row input[type="number"] {
            flex: 1;
        }

        .filter-controls-row button {
            width: auto;
            padding: 0.5rem;
            background: #ef4444;
            font-size: 0.8rem;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .filter-controls-row button:hover {
            background: #dc2626;
        }

        .kwargs-item {
            display: grid;
            grid-template-columns: 1.5fr 2fr 2fr 1.5fr auto;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            align-items: end;
        }

        .info-icon {
            display: inline-block;
            width: 16px;
            height: 16px;
            background: #6b7280;
            border-radius: 50%;
            color: white;
            text-align: center;
            font-size: 12px;
            line-height: 16px;
            cursor: help;
            margin-left: 4px;
            position: relative;
        }

        .info-tooltip {
            position: absolute;
            bottom: 100%;
            left: 0;
            right: 0;
            margin-bottom: 5px;
            background: #1f2937;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            white-space: normal;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 100%;
            box-sizing: border-box;
        }

        .info-tooltip::before {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #1f2937;
        }

        .param-option-with-info {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .param-option-with-info:hover .info-tooltip {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .spec-item {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2rem;
            }

            .content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Component Matcher</h1>
            <p>Find and score components based on your specifications</p>
        </div>

        <div class="content">
            <!-- Step 1: Select Solution -->
            <div class="section">
                <h2>1. Select Solution Type</h2>
                <div class="form-group">
                    <label for="solutionSelect">Choose a solution category:</label>
                    <select id="solutionSelect">
                        <option value="">Loading solutions...</option>
                    </select>
                </div>
            </div>

            <!-- Step 2: Select System -->
            <div class="section hidden" id="systemSection">
                <h2>2. Select System Type</h2>
                <div class="loading-indicator" id="systemLoadingIndicator">Loading systems...</div>
                <div class="form-group">
                    <label for="systemSelect">Choose a system:</label>
                    <select id="systemSelect">
                        <option value="">Select a solution first</option>
                    </select>
                </div>
            </div>

            <!-- Step 3: Configure Specifications -->
            <div class="section hidden" id="specsSection">
                <h2>3. Configure Specifications</h2>
                <div class="loading-indicator" id="specsLoadingIndicator">Loading parameters...</div>
                <div class="specs-container">
                    <div id="specsContainer">
                        <!-- Specs will be added here dynamically -->
                    </div>
                    <button type="button" class="add-btn" id="addSpecBtn">Add Specification</button>
                </div>
                <button type="button" id="searchBtn" style="margin-top: 1rem;">Search Components</button>
            </div>

            <!-- Step 4: Configure Scoring Parameters (Optional) -->
            <div class="section hidden" id="kwargsSection">
                <h2>4. Configure Scoring Parameters (Optional)</h2>
                <div class="kwargs-container">
                    <div id="kwargsContainer">
                        <!-- Kwargs will be added here -->
                    </div>
                    <button type="button" class="add-btn" id="addKwargBtn">Add Scoring Parameter</button>
                </div>
            </div>

            <!-- Results Section -->
            <div class="section hidden" id="resultsSection">
                <h2>Results</h2>

                <!-- Filters and Sorting Controls -->
                <div class="hidden" id="resultControls">
                    <div class="grid" style="margin-bottom: 1rem;">
                        <div>
                            <h3>Filter Results</h3>
                            <div id="filtersContainer">
                                <!-- Filters will be added here -->
                            </div>
                            <button type="button" class="add-btn" id="addFilterBtn">Add Filter</button>
                        </div>

                        <div>
                            <h3>Sort Results</h3>
                            <div class="form-group">
                                <label for="sortBySelect">Sort by:</label>
                                <select id="sortBySelect">
                                    <option value="overall_score">Overall Score</option>
                                </select>
                            </div>
                            <div class="form-group" style="display: flex; align-items: center; gap: 0.3rem; white-space: nowrap;">
                                <label for="sortAscCheckbox" style="margin: 0;">Sort ascending</label>
                                <input type="checkbox" id="sortAscCheckbox">
                            </div>
                            <div class="form-group" style="display: flex; align-items: center; gap: 0.3rem; white-space: nowrap;">
                                <label for="scoreCouplingCheckbox" style="margin: 0;">Score coupling</label>
                                <input type="checkbox" id="scoreCouplingCheckbox">
                            </div>
                        </div>

                        <div>
                            <h3>Pagination</h3>
                            <div class="form-group">
                                <label for="pageInput">Page:</label>
                                <input type="number" id="pageInput" value="1" min="1">
                            </div>
                            <div class="form-group">
                                <label for="perPageSelect">Results per page:</label>
                                <select id="perPageSelect">
                                    <option value="10">10</option>
                                    <option value="25">25</option>
                                    <option value="50">50</option>
                                    <option value="100">100</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button type="button" id="applyFiltersBtn">Apply Filters & Sorting</button>
                </div>

                <div class="results-container" id="resultsContainer">
                    <!-- Results will be displayed here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://129.159.89.217:8000'; // Change this to your API URL

        let currentSolution = '';
        let currentSystem = '';
        let availableColumns = [];
        let currentSessionId = '';
        let allResultColumns = [];
        let availableDataTypes = new Set();
        let globalKwargProfiles = {}; // kwargs organized by data type
        let selectedSpecs = new Set(); // track which columns are being scored

        // Initialize the application
        async function init() {
            await loadSolutions();
            await loadGlobalKwargProfiles();
        }

        // Load available solutions
        async function loadSolutions() {
            try {
                const response = await fetch(`${API_BASE}/options`);
                const data = await response.json();

                const select = document.getElementById('solutionSelect');
                select.innerHTML = '<option value="">Select a solution...</option>';

                data.schemas.forEach(schema => {
                    // Filter out metadata and pg_toast schemas
                    if (schema !== 'metadata' && schema !== 'pg_toast') {
                        const option = document.createElement('option');
                        option.value = schema;
                        option.textContent = schema;
                        select.appendChild(option);
                    }
                });
            } catch (error) {
                showError('Failed to load solutions: ' + error.message);
            }
        }

        // Load global kwargs profiles
        async function loadGlobalKwargProfiles() {
            try {
                const response = await fetch(`${API_BASE}/kwargs`);
                const data = await response.json();
                globalKwargProfiles = data;
            } catch (error) {
                console.warn('Failed to load global kwargs profiles:', error.message);
                globalKwargProfiles = {};
            }
        }

        // Load systems for selected solution
        async function loadSystems(solution) {
            try {
                // Reset subsequent sections when solution changes
                resetSystemAndBelow();

                // Show loading indicator
                document.getElementById('systemSection').classList.remove('hidden');
                document.getElementById('systemLoadingIndicator').classList.add('show');

                const response = await fetch(`${API_BASE}/options/${solution}`);
                const data = await response.json();

                const select = document.getElementById('systemSelect');
                select.innerHTML = '<option value="">Select a system...</option>';

                data.tables.forEach(table => {
                    const option = document.createElement('option');
                    option.value = table;
                    option.textContent = table;
                    select.appendChild(option);
                });

                // Hide loading indicator
                document.getElementById('systemLoadingIndicator').classList.remove('show');

            } catch (error) {
                document.getElementById('systemLoadingIndicator').classList.remove('show');
                showError('Failed to load systems: ' + error.message);
            }
        }

        // Reset system selection and everything below it
        function resetSystemAndBelow() {
            document.getElementById('systemSelect').innerHTML = '<option value="">Select a system...</option>';
            document.getElementById('specsSection').classList.add('hidden');
            document.getElementById('kwargsSection').classList.add('hidden');
            resetResultsAndBelow();
            currentSystem = '';
            availableColumns = [];
            availableDataTypes.clear();
        }

        // Load parameters for selected system
        async function loadParameters(solution, system) {
            try {
                // Reset everything below this level
                resetResultsAndBelow();

                // Show loading indicator
                document.getElementById('specsSection').classList.remove('hidden');
                document.getElementById('specsLoadingIndicator').classList.add('show');

                const response = await fetch(`${API_BASE}/options/${solution}/${system}`);
                const data = await response.json();

                availableColumns = data.columns;

                // Collect unique data types
                availableDataTypes.clear();
                data.columns.forEach(col => {
                    availableDataTypes.add(col.dtype);
                });

                setupSpecsSection();
                setupKwargsSection();

                // Hide loading indicator
                document.getElementById('specsLoadingIndicator').classList.remove('show');

            } catch (error) {
                document.getElementById('specsLoadingIndicator').classList.remove('show');
                showError('Failed to load parameters: ' + error.message);
            }
        }

        // Reset results and everything below
        function resetResultsAndBelow() {
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('resultControls').classList.add('hidden');
            currentSessionId = '';
            allResultColumns = [];
        }

        // Setup specifications section
        function setupSpecsSection() {
            // Reset results when specs change
            resetResultsAndBelow();

            const container = document.getElementById('specsContainer');
            container.innerHTML = '';
            addSpecificationRow();
        }

        // Setup kwargs section
        function setupKwargsSection() {
            document.getElementById('kwargsSection').classList.remove('hidden');

            const container = document.getElementById('kwargsContainer');
            container.innerHTML = '';
        }

        // Add a specification row
        function addSpecificationRow() {
            const container = document.getElementById('specsContainer');
            const specItem = document.createElement('div');
            specItem.className = 'spec-item';

            // Get already used parameters to prevent duplicates
            const usedParams = Array.from(container.querySelectorAll('.spec-item select')).map(select => select.value).filter(val => val);

            const paramSelect = document.createElement('select');
            paramSelect.innerHTML = '<option value="">Select parameter...</option>';
            availableColumns.forEach(col => {
                // Only add if not already used
                if (!usedParams.includes(col.name)) {
                    const option = document.createElement('option');
                    option.value = col.name;
                    option.textContent = `${col.name} (${col.dtype})`;
                    paramSelect.appendChild(option);
                }
            });

            const valueContainer = document.createElement('div');
            valueContainer.className = 'spec-value-container';

            const valueInput = document.createElement('input');
            valueInput.type = 'text';
            valueInput.placeholder = 'Value';
            valueInput.className = 'spec-search-input';
            valueInput.readOnly = true; // Make it read-only for multi-select

            const multiSelectDiv = document.createElement('div');
            multiSelectDiv.className = 'spec-multi-select';

            const selectedItemsDiv = document.createElement('div');
            selectedItemsDiv.className = 'spec-selected-items';

            valueContainer.appendChild(valueInput);
            valueContainer.appendChild(selectedItemsDiv);
            valueContainer.appendChild(multiSelectDiv);

            // Setup search functionality
            let currentOptions = [];
            let selectedValues = [];
            let isMultiSelect = false;

            // Update options when parameter changes
            paramSelect.addEventListener('change', function() {
                const selectedParam = availableColumns.find(col => col.name === this.value);
                currentOptions = selectedParam?.options || [];
                selectedValues = [];

                // Check parameter type for input mode
                if (selectedParam && selectedParam.dtype === 'boolean') {
                    // Boolean parameters get a true/false dropdown
                    isMultiSelect = false;
                    currentOptions = ['true', 'false'];
                    valueInput.placeholder = 'Click to select true/false';
                    valueInput.readOnly = true;
                } else if (selectedParam && selectedParam.dtype === 'list' && currentOptions.length > 0) {
                    // List parameters get multi-select checkboxes
                    isMultiSelect = true;
                    valueInput.placeholder = 'Click to select options';
                    valueInput.readOnly = true;
                } else if (currentOptions.length > 0) {
                    // String parameters with options get single-select dropdown
                    isMultiSelect = false;
                    valueInput.placeholder = 'Value (click to see options)';
                    valueInput.readOnly = false;
                } else {
                    // Parameters without options get regular text input
                    isMultiSelect = false;
                    valueInput.placeholder = 'Value';
                    valueInput.readOnly = false;
                }

                valueInput.value = '';
                multiSelectDiv.style.display = 'none';
                updateSelectedItems();

                // Update other dropdowns to remove this selection
                updateParameterDropdowns();
                updateKwargsAvailability();
            });

            // Show multi-select when clicking on input (for multi-select mode)
            valueInput.addEventListener('click', function() {
                const selectedParam = availableColumns.find(col => col.name === paramSelect.value);

                if (selectedParam && selectedParam.dtype === 'boolean') {
                    // Show true/false dropdown for boolean parameters
                    showBooleanSelect();
                } else if (isMultiSelect && currentOptions.length > 0) {
                    showMultiSelect();
                } else if (!isMultiSelect && currentOptions.length > 0) {
                    showSingleSelect();
                }
            });

            // Handle comma-separated input for contains_any functionality
            valueInput.addEventListener('input', function() {
                if (!isMultiSelect && currentOptions.length > 0) {
                    // Get the current input value
                    const fullValue = this.value;

                    // Check if this might be a comma-separated list (for contains_any)
                    const lastCommaIndex = fullValue.lastIndexOf(',');
                    let searchTerm = fullValue;
                    let prefix = '';

                    if (lastCommaIndex !== -1) {
                        // Split at last comma
                        prefix = fullValue.substring(0, lastCommaIndex + 1).trim() + ' ';
                        searchTerm = fullValue.substring(lastCommaIndex + 1).trim();
                    }

                    showSingleSelect(searchTerm, prefix);
                }
            });

            function showSingleSelect(query = '', prefix = '') {
                multiSelectDiv.innerHTML = '';

                if (currentOptions.length === 0) {
                    multiSelectDiv.style.display = 'none';
                    return;
                }

                const filteredOptions = query === '' ?
                    currentOptions :
                    currentOptions.filter(option =>
                        option.toString().toLowerCase().includes(query.toLowerCase())
                    );

                if (filteredOptions.length === 0) {
                    multiSelectDiv.style.display = 'none';
                    return;
                }

                // Sort filtered options alphabetically
                const sortedOptions = filteredOptions.sort((a, b) =>
                    a.toString().localeCompare(b.toString())
                );

                sortedOptions.forEach(option => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'spec-multi-option';
                    optionDiv.style.justifyContent = 'flex-start';

                    const label = document.createElement('span');
                    label.textContent = option;
                    label.style.cursor = 'pointer';

                    optionDiv.appendChild(label);

                    optionDiv.addEventListener('click', function() {
                        if (prefix) {
                            // For comma-separated lists, append to existing content
                            valueInput.value = prefix + option;
                        } else {
                            // Normal single selection
                            valueInput.value = option;
                        }
                        multiSelectDiv.style.display = 'none';
                    });

                    multiSelectDiv.appendChild(optionDiv);
                });

                multiSelectDiv.style.display = 'block';
            }

            function showBooleanSelect() {
                multiSelectDiv.innerHTML = '';

                ['false', 'true'].forEach(option => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'spec-multi-option';
                    optionDiv.style.justifyContent = 'flex-start';

                    const label = document.createElement('span');
                    label.textContent = option;
                    label.style.cursor = 'pointer';

                    optionDiv.appendChild(label);

                    optionDiv.addEventListener('click', function() {
                        valueInput.value = option;
                        multiSelectDiv.style.display = 'none';
                    });

                    multiSelectDiv.appendChild(optionDiv);
                });

                multiSelectDiv.style.display = 'block';
            }

            function showMultiSelect() {
                multiSelectDiv.innerHTML = '';

                // Sort options alphabetically
                const sortedOptions = [...currentOptions].sort((a, b) =>
                    a.toString().localeCompare(b.toString())
                );

                sortedOptions.forEach(option => {
                    const optionDiv = document.createElement('div');
                    optionDiv.className = 'spec-multi-option';

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = selectedValues.includes(option);

                    const label = document.createElement('span');
                    label.textContent = option;

                    optionDiv.appendChild(checkbox);
                    optionDiv.appendChild(label);

                    optionDiv.addEventListener('click', function(e) {
                        if (e.target.type !== 'checkbox') {
                            checkbox.checked = !checkbox.checked;
                        }
                        toggleOption(option, checkbox.checked);
                    });

                    checkbox.addEventListener('change', function() {
                        toggleOption(option, this.checked);
                    });

                    multiSelectDiv.appendChild(optionDiv);
                });

                multiSelectDiv.style.display = 'block';
            }

            function toggleOption(option, isSelected) {
                if (isSelected) {
                    if (!selectedValues.includes(option)) {
                        selectedValues.push(option);
                    }
                } else {
                    selectedValues = selectedValues.filter(val => val !== option);
                }
                updateSelectedItems();
                updateInputValue();
            }

            function updateSelectedItems() {
                // Hidden for now to clean up the interface
                selectedItemsDiv.innerHTML = '';
            }

            function updateInputValue() {
                if (isMultiSelect) {
                    valueInput.value = selectedValues.join(', ');
                }
            }

            // Hide multi-select when clicking outside
            document.addEventListener('click', function(e) {
                if (!valueContainer.contains(e.target)) {
                    multiSelectDiv.style.display = 'none';
                }
            });

            const weightInput = document.createElement('input');
            weightInput.type = 'number';
            weightInput.placeholder = 'Weight';
            weightInput.value = '1';
            weightInput.step = '0.1';
            weightInput.min = '0.1';

            const removeBtn = document.createElement('button');
            removeBtn.textContent = '×';
            removeBtn.className = 'remove-btn';
            removeBtn.onclick = () => {
                specItem.remove();
                updateKwargsAvailability();
            };

            specItem.appendChild(paramSelect);
            specItem.appendChild(valueContainer);
            specItem.appendChild(weightInput);
            specItem.appendChild(removeBtn);

            container.appendChild(specItem);
        }

        // Update parameter dropdowns to prevent duplicates
        function updateParameterDropdowns() {
            const container = document.getElementById('specsContainer');
            const allSelects = container.querySelectorAll('.spec-item select');
            const usedParams = Array.from(allSelects).map(select => select.value).filter(val => val);

            allSelects.forEach(select => {
                const currentValue = select.value;
                select.innerHTML = '<option value="">Select parameter...</option>';

                availableColumns.forEach(col => {
                    // Add option if it's not used elsewhere OR it's the current selection
                    if (!usedParams.includes(col.name) || col.name === currentValue) {
                        const option = document.createElement('option');
                        option.value = col.name;
                        option.textContent = `${col.name} (${col.dtype})`;
                        if (col.name === currentValue) option.selected = true;
                        select.appendChild(option);
                    }
                });
            });
        }

        // Update kwargs availability based on selected specs - now refreshes existing dropdowns
        function updateKwargsAvailability() {
            // Refresh all existing type and column selection dropdowns in kwargs
            const kwargItems = document.querySelectorAll('#kwargsContainer .kwargs-item');

            kwargItems.forEach(item => {
                const typeSelect = item.children[0];  // kwarg type select
                const selectionSelect = item.children[1];  // selection dropdown

                const currentKwargType = typeSelect.value;
                const currentSelection = selectionSelect.value;

                // Only update if a kwarg type is selected
                if (currentKwargType === 'type') {
                    // Refresh with available data types
                    populateSelectionWithTypes(selectionSelect);
                    // Restore selection if it still exists
                    if (currentSelection) {
                        const optionExists = Array.from(selectionSelect.options).some(opt => opt.value === currentSelection);
                        if (optionExists) {
                            selectionSelect.value = currentSelection;
                        }
                    }
                } else if (currentKwargType === 'column') {
                    // Refresh with available columns
                    populateSelectionWithColumns(selectionSelect);
                    // Restore selection if it still exists
                    if (currentSelection) {
                        const optionExists = Array.from(selectionSelect.options).some(opt => opt.value === currentSelection);
                        if (optionExists) {
                            selectionSelect.value = currentSelection;
                        }
                    }
                }
            });

            console.log('Kwargs dropdowns refreshed with current specifications');
        }

        // Helper function to get value from value container (handles different input types)
        function getValueFromContainer(container) {
            // Check for additional select elements (boolean dropdown or options dropdown)
            // Look for selects that are not the first 3 main selects in the kwargs item
            const parentItem = container.closest('.kwargs-item');
            const extraSelects = parentItem.querySelectorAll('select:not(:nth-child(1)):not(:nth-child(2)):not(:nth-child(3))');

            if (extraSelects.length > 0 && extraSelects[0].style.display !== 'none') {
                const value = extraSelects[0].value;
                if (value === 'true') return true;
                if (value === 'false') return false;
                return value || null;
            }

            // Check for regular input (if it's the valueInput itself)
            if (container.tagName === 'INPUT' && container.style.display !== 'none') {
                if (container.type === 'number') {
                    return container.value ? parseFloat(container.value) : null;
                }
                return container.value || null;
            }

            return null;
        }

        // Helper function to populate selection with data types
        function populateSelectionWithTypes(selectionSelect) {
            const currentSpecs = getCurrentSelectedSpecs();
            const usedDtypes = new Set();

            currentSpecs.forEach(colName => {
                const col = availableColumns.find(c => c.name === colName);
                if (col) {
                    usedDtypes.add(col.dtype);
                }
            });

            selectionSelect.innerHTML = '<option value="">Select data type...</option>';
            if (usedDtypes.size === 0) {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = 'No specifications selected';
                option.disabled = true;
                selectionSelect.appendChild(option);
            } else {
                Array.from(usedDtypes).sort().forEach(dtype => {
                    const option = document.createElement('option');
                    option.value = dtype;
                    option.textContent = dtype;
                    selectionSelect.appendChild(option);
                });
            }
        }

        // Helper function to populate selection with columns
        function populateSelectionWithColumns(selectionSelect) {
            const currentSpecs = getCurrentSelectedSpecs();

            selectionSelect.innerHTML = '<option value="">Select column...</option>';
            if (currentSpecs.length === 0) {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = 'No specifications selected';
                option.disabled = true;
                selectionSelect.appendChild(option);
            } else {
                currentSpecs.forEach(colName => {
                    const col = availableColumns.find(c => c.name === colName);
                    if (col) {
                        const option = document.createElement('option');
                        option.value = col.name;
                        option.textContent = `${col.name} (${col.dtype})`;
                        option.dataset.columnData = JSON.stringify(col);
                        selectionSelect.appendChild(option);
                    }
                });
            }
        }

        // Helper function to populate parameters based on type and selection
        function populateParameters(paramSelect, kwargType, selectedItem, selectionElement) {
            paramSelect.innerHTML = '<option value="">Select parameter...</option>';

            // Get already used kwarg parameters for this specific type+selection combination
            const usedKwargsForThisCombo = getUsedKwargParametersForCombo(kwargType, selectedItem);

            if (kwargType === 'type') {
                // Type-wide: selectedItem is a dtype, show type-wide parameters
                if (globalKwargProfiles[selectedItem]) {
                    globalKwargProfiles[selectedItem].forEach(kwargProfile => {
                        // Only add if not already used for this specific type+selection
                        if (!usedKwargsForThisCombo.has(kwargProfile.name)) {
                            const option = document.createElement('option');
                            option.value = kwargProfile.name;
                            option.textContent = kwargProfile.name;
                            option.dataset.kwargProfile = JSON.stringify(kwargProfile);
                            paramSelect.appendChild(option);
                        }
                    });
                }
            } else if (kwargType === 'column') {
                // Column-specific: selectedItem is a column name
                const selectedColData = JSON.parse(selectionElement.selectedOptions[0]?.dataset.columnData || '{}');

                // Use a Set to track parameter names and avoid duplicates
                const addedParams = new Set();

                // First priority: column-specific kwargs if available
                if (selectedColData.kwargs && selectedColData.kwargs.length > 0) {
                    selectedColData.kwargs.forEach(kwargProfile => {
                        if (!addedParams.has(kwargProfile.name) && !usedKwargsForThisCombo.has(kwargProfile.name)) {
                            const option = document.createElement('option');
                            option.value = kwargProfile.name;
                            option.textContent = kwargProfile.name;
                            option.dataset.kwargProfile = JSON.stringify(kwargProfile);
                            paramSelect.appendChild(option);
                            addedParams.add(kwargProfile.name);
                        }
                    });
                }

                // Second priority: type-wide kwargs for this column's data type (only if not already added)
                if (selectedColData.dtype && globalKwargProfiles[selectedColData.dtype]) {
                    globalKwargProfiles[selectedColData.dtype].forEach(kwargProfile => {
                        if (!addedParams.has(kwargProfile.name) && !usedKwargsForThisCombo.has(kwargProfile.name)) {
                            const option = document.createElement('option');
                            option.value = kwargProfile.name;
                            option.textContent = kwargProfile.name;
                            option.dataset.kwargProfile = JSON.stringify(kwargProfile);
                            paramSelect.appendChild(option);
                            addedParams.add(kwargProfile.name);
                        }
                    });
                }
            }
        }

        // Get used kwarg parameters for a specific type+selection combination
        function getUsedKwargParametersForCombo(kwargType, selection) {
            const usedParams = new Set();
            const kwargItems = document.querySelectorAll('#kwargsContainer .kwargs-item');

            kwargItems.forEach(item => {
                const itemKwargType = item.children[0].value;      // 'type' or 'column'
                const itemSelection = item.children[1].value;      // dtype or column name
                const paramName = item.children[2].querySelector('select').value;  // parameter name

                // Only count as used if it's the same type AND same selection
                if (itemKwargType === kwargType && itemSelection === selection && paramName) {
                    usedParams.add(paramName);
                }
            });

            return usedParams;
        }

        // Helper function to get currently selected specs from the page
        function getCurrentSelectedSpecs() {
            const specs = [];
            const specItems = document.querySelectorAll('.spec-item');
            specItems.forEach(item => {
                const param = item.children[0].value;
                if (param) {
                    specs.push(param);
                }
            });
            return specs;
        }

        // Add a unified kwargs row
        function addKwargRow() {
            const container = document.getElementById('kwargsContainer');
            const kwargsItem = document.createElement('div');
            kwargsItem.className = 'kwargs-item';

            // 1. Kwarg Type select (Type-wide vs Column-specific)
            const typeSelect = document.createElement('select');
            typeSelect.innerHTML = `
                <option value="">Select type...</option>
                <option value="type">Type-wide</option>
                <option value="column">Column-specific</option>
            `;

            // 2. Selection dropdown (dtype or column based on type selection)
            const selectionSelect = document.createElement('select');
            selectionSelect.innerHTML = '<option value="">Select...</option>';
            selectionSelect.disabled = true;

            // 3. Parameter select
            const paramContainer = document.createElement('div');
            paramContainer.style.position = 'relative';

            const paramSelect = document.createElement('select');
            paramSelect.innerHTML = '<option value="">Select parameter...</option>';
            paramSelect.disabled = true;

            // Add tooltip div that will show on hover
            const paramTooltip = document.createElement('div');
            paramTooltip.className = 'info-tooltip';
            paramTooltip.style.display = 'none';
            paramContainer.appendChild(paramSelect);
            paramContainer.appendChild(paramTooltip);

            // 4. Value input
            const valueInput = document.createElement('input');
            valueInput.type = 'text';
            valueInput.placeholder = 'Parameter value';
            valueInput.disabled = true;

            // 5. Remove button
            const removeBtn = document.createElement('button');
            removeBtn.textContent = '×';
            removeBtn.className = 'remove-btn';
            removeBtn.onclick = () => {
                kwargsItem.remove();
                updateKwargsDropdowns(); // Update other kwargs when one is removed
            };

            // Event listeners for cascading dropdowns
            typeSelect.addEventListener('change', function() {
                const selectedType = this.value;

                // Reset dependent dropdowns
                selectionSelect.innerHTML = '<option value="">Select...</option>';
                paramSelect.innerHTML = '<option value="">Select parameter...</option>';
                valueInput.value = '';

                if (selectedType === 'type') {
                    // Populate with dtypes
                    selectionSelect.disabled = false;
                    populateSelectionWithTypes(selectionSelect);
                } else if (selectedType === 'column') {
                    // Populate with columns
                    selectionSelect.disabled = false;
                    populateSelectionWithColumns(selectionSelect);
                } else {
                    selectionSelect.disabled = true;
                    paramSelect.disabled = true;
                    valueInput.disabled = true;
                }
            });

            selectionSelect.addEventListener('change', function() {
                const kwargType = typeSelect.value;
                const selectedItem = this.value;

                // Reset dependent dropdowns
                paramSelect.innerHTML = '<option value="">Select parameter...</option>';
                valueInput.value = '';

                if (selectedItem) {
                    paramSelect.disabled = false;
                    populateParameters(paramSelect, kwargType, selectedItem, this);
                } else {
                    paramSelect.disabled = true;
                    valueInput.disabled = true;
                }
            });

            paramSelect.addEventListener('change', function() {
                if (this.value) {
                    valueInput.disabled = false;
                    updateValueInputForKwarg(this, valueInput);

                    // Update tooltip with parameter description
                    const selectedOption = this.selectedOptions[0];
                    if (selectedOption && selectedOption.dataset.kwargProfile) {
                        const kwargProfile = JSON.parse(selectedOption.dataset.kwargProfile);
                        paramTooltip.textContent = `Default: ${kwargProfile.default} | ${kwargProfile.description}`;
                        paramTooltip.style.display = 'block';
                    }
                } else {
                    valueInput.disabled = true;
                    paramTooltip.style.display = 'none';
                    // Remove any extra select elements
                    const existingSelect = valueInput.parentElement.querySelector('select:not([id]):not(.kwargs-item select)');
                    if (existingSelect) {
                        existingSelect.remove();
                    }
                }
                updateKwargsDropdowns(); // Move this outside the if/else
            });

            // Show/hide tooltip on hover
            paramContainer.addEventListener('mouseenter', function() {
                if (paramSelect.value && paramTooltip.textContent) {
                    paramTooltip.style.opacity = '1';
                }
            });

            paramContainer.addEventListener('mouseleave', function() {
                paramTooltip.style.opacity = '0';
            });

            kwargsItem.appendChild(typeSelect);
            kwargsItem.appendChild(selectionSelect);
            kwargsItem.appendChild(paramContainer);  // Use container instead of paramSelect directly
            kwargsItem.appendChild(valueInput);
            kwargsItem.appendChild(removeBtn);

            container.appendChild(kwargsItem);
        }

        // Update parameter suggestions for column kwargs
        function updateParamSuggestions(paramInput, paramDropdown, kwargs) {
            if (!kwargs || Object.keys(kwargs).length === 0) {
                paramDropdown.style.display = 'none';
                return;
            }

            paramDropdown.innerHTML = '';

            Object.keys(kwargs).forEach(paramName => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'spec-multi-option';
                optionDiv.style.justifyContent = 'flex-start';

                const label = document.createElement('span');
                label.textContent = `${paramName}: ${kwargs[paramName]}`;
                label.style.cursor = 'pointer';

                optionDiv.appendChild(label);

                optionDiv.addEventListener('click', function() {
                    paramInput.value = paramName;
                    paramDropdown.style.display = 'none';
                });

                paramDropdown.appendChild(optionDiv);
            });
        }

        // Show parameter suggestions
        function showParamSuggestions(paramInput, paramDropdown, kwargs) {
            if (!kwargs || Object.keys(kwargs).length === 0) {
                return;
            }

            updateParamSuggestions(paramInput, paramDropdown, kwargs);
            paramDropdown.style.display = 'block';

            // Hide dropdown when clicking outside
            const hideDropdown = (e) => {
                if (!paramInput.parentElement.contains(e.target)) {
                    paramDropdown.style.display = 'none';
                    document.removeEventListener('click', hideDropdown);
                }
            };

            setTimeout(() => {
                document.addEventListener('click', hideDropdown);
            }, 0);
        }

        // Update value input based on selected kwarg profile
        function updateValueInputForKwarg(paramSelect, valueInput) {
            const selectedOption = paramSelect.selectedOptions[0];
            if (!selectedOption || !selectedOption.dataset.kwargProfile) {
                valueInput.type = 'text';
                valueInput.placeholder = 'Parameter value';
                valueInput.value = '';
                // Remove any existing additional select elements (but not the main selects)
                const parentItem = valueInput.closest('.kwargs-item');
                const extraSelects = parentItem.querySelectorAll('select:not(:nth-child(1)):not(:nth-child(2)):not(:nth-child(3))');
                extraSelects.forEach(select => select.remove());
                valueInput.style.display = 'block';
                return;
            }

            const kwargProfile = JSON.parse(selectedOption.dataset.kwargProfile);
            const dtype = kwargProfile.dtype.toLowerCase();

            // Remove any existing additional select elements (but keep the main 3 selects)
            const parentItem = valueInput.closest('.kwargs-item');
            const extraSelects = parentItem.querySelectorAll('select:not(:nth-child(1)):not(:nth-child(2)):not(:nth-child(3))');
            extraSelects.forEach(select => select.remove());

            // If there are options, create a dropdown
            if (kwargProfile.options && kwargProfile.options.length > 0) {
                valueInput.style.display = 'none';

                const optionsSelect = document.createElement('select');
                optionsSelect.innerHTML = '<option value="">Select option...</option>';

                kwargProfile.options.forEach(option => {
                    const optionElement = document.createElement('option');
                    optionElement.value = option;
                    optionElement.textContent = option;
                    if (option === kwargProfile.default) {
                        optionElement.selected = true;
                    }
                    optionsSelect.appendChild(optionElement);
                });

                // Insert after the valueInput (4th position)
                valueInput.parentNode.insertBefore(optionsSelect, valueInput.nextSibling);
                return;
            }

            // Show the input and configure it based on type
            valueInput.style.display = 'block';

            if (dtype === 'boolean') {
                // Create true/false dropdown for booleans
                valueInput.style.display = 'none';

                const boolSelect = document.createElement('select');
                boolSelect.innerHTML = `
                    <option value="">Select...</option>
                    <option value="true" ${kwargProfile.default === true ? 'selected' : ''}>true</option>
                    <option value="false" ${kwargProfile.default === false ? 'selected' : ''}>false</option>
                `;

                // Insert after the valueInput (4th position)
                valueInput.parentNode.insertBefore(boolSelect, valueInput.nextSibling);
            } else if (dtype === 'int' || dtype === 'integer') {
                valueInput.type = 'number';
                valueInput.step = '1';
                valueInput.value = kwargProfile.default || '';
                valueInput.placeholder = `Default: ${kwargProfile.default}`;
            } else if (dtype === 'float' || dtype === 'number') {
                valueInput.type = 'number';
                valueInput.step = 'any';
                valueInput.value = kwargProfile.default || '';
                valueInput.placeholder = `Default: ${kwargProfile.default}`;
            } else {
                valueInput.type = 'text';
                valueInput.value = kwargProfile.default || '';
                valueInput.placeholder = `Default: ${kwargProfile.default}`;
            }
        }

        // Perform search
        async function performSearch() {
            const specs = [];
            const specItems = document.querySelectorAll('.spec-item');

            for (let item of specItems) {
                const param = item.children[0].value;
                const value = item.children[1].querySelector('input').value;
                const weight = parseFloat(item.children[2].value);

                if (param && value && weight) {
                    // Try to parse value as number if possible
                    let parsedValue = value;
                    if (!isNaN(value) && !isNaN(parseFloat(value))) {
                        parsedValue = parseFloat(value);
                    }

                    specs.push({
                        name: param,
                        value: parsedValue,
                        weight: weight
                    });
                }
            }

            if (specs.length === 0) {
                showError('Please add at least one specification');
                return;
            }

            // Collect kwargs
            const kwargs = {
                col_kwargs: {},
                type_kwargs: {}
            };

            // Collect kwargs from unified structure
            const kwargItems = document.querySelectorAll('#kwargsContainer .kwargs-item');
            console.log('Found kwargs items:', kwargItems.length);

            kwargItems.forEach((item, index) => {
                const kwargType = item.children[0].value;      // 'type' or 'column'
                const selection = item.children[1].value;      // dtype or column name
                const paramName = item.children[2].querySelector('select').value;  // parameter name (now in container)
                const valueContainer = item.children[3];       // value input/select

                console.log(`Kwarg ${index}:`, {
                    kwargType,
                    selection,
                    paramName,
                    valueContainer: valueContainer.tagName
                });

                if (kwargType && selection && paramName) {
                    // Get value from appropriate input element
                    let paramValue = getValueFromContainer(valueContainer);
                    console.log(`Kwarg ${index} value:`, paramValue);

                    // Only add if we have a value
                    if (paramValue !== null && paramValue !== '' && paramValue !== undefined) {
                        if (kwargType === 'type') {
                            // Type-wide kwargs
                            if (!kwargs.type_kwargs[selection]) {
                                kwargs.type_kwargs[selection] = {};
                            }
                            kwargs.type_kwargs[selection][paramName] = paramValue;
                        } else if (kwargType === 'column') {
                            // Column-specific kwargs
                            if (!kwargs.col_kwargs[selection]) {
                                kwargs.col_kwargs[selection] = {};
                            }
                            kwargs.col_kwargs[selection][paramName] = paramValue;
                        }
                    }
                }
            });

            console.log('Final kwargs object:', kwargs);

            // Only include kwargs if there are any
            const hasKwargs = Object.keys(kwargs.col_kwargs).length > 0 || Object.keys(kwargs.type_kwargs).length > 0;

            const searchRequest = {
                location: {
                    schema: currentSolution,
                    table: currentSystem
                },
                specs: specs,
                session_id: currentSessionId || null,
                kwargs: hasKwargs ? kwargs : null
            };

            try {
                document.getElementById('searchBtn').disabled = true;
                document.getElementById('searchBtn').textContent = 'Searching...';

                const response = await fetch(`${API_BASE}/search`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(searchRequest)
                });

                const data = await response.json();
                currentSessionId = data.session_id;
                // FIXED: Changed from data.results to data.values
                displayResults(data.values);

            } catch (error) {
                showError('Search failed: ' + error.message);
            } finally {
                document.getElementById('searchBtn').disabled = false;
                document.getElementById('searchBtn').textContent = 'Search Components';
            }
        }

        // Display search results
        function displayResults(results) {
            const container = document.getElementById('resultsContainer');

            if (!results || results.length === 0) {
                container.innerHTML = '<p>No results found.</p>';
                document.getElementById('resultsSection').classList.remove('hidden');
                return;
            }

            // Store all available columns for filtering/sorting
            allResultColumns = Object.keys(results[0]);
            setupResultControls();

            const table = document.createElement('table');
            table.className = 'results-table';

            // Create header
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');

            allResultColumns.forEach(key => {
                const th = document.createElement('th');
                th.textContent = key.replace('_', ' ').toUpperCase();
                headerRow.appendChild(th);
            });

            thead.appendChild(headerRow);
            table.appendChild(thead);

            // Create body
            const tbody = document.createElement('tbody');

            results.forEach(result => {
                const row = document.createElement('tr');

                allResultColumns.forEach(key => {
                    const td = document.createElement('td');
                    let value = result[key];

                    // Convert boolean values (0/1) to true/false for boolean columns
                    const column = availableColumns.find(col => col.name === key);
                    if (column && column.dtype === 'boolean') {
                        if (value === 1 || value === '1' || value === true) {
                            value = 'true';
                        } else if (value === 0 || value === '0' || value === false) {
                            value = 'false';
                        }
                    }

                    td.textContent = value !== null && value !== undefined ? value : 'N/A';

                    // Highlight score columns
                    if (key.toLowerCase().includes('score')) {
                        td.className = 'score-cell';
                    }

                    row.appendChild(td);
                });

                tbody.appendChild(row);
            });

            table.appendChild(tbody);

            // Create dedicated table container
            const tableContainer = document.createElement('div');
            tableContainer.className = 'results-table-container';
            tableContainer.appendChild(table);

            container.innerHTML = '';
            container.appendChild(tableContainer);

            document.getElementById('resultsSection').classList.remove('hidden');
            document.getElementById('resultControls').classList.remove('hidden');
            showSuccess(`Found ${results.length} results (Session ID: ${currentSessionId})`);
        }

        // Setup result controls (filters, sorting, pagination)
        function setupResultControls() {
            // Store current values before updating
            const currentSortBy = document.getElementById('sortBySelect').value;
            const currentSortAsc = document.getElementById('sortAscCheckbox').checked;
            const currentScoreCoupling = document.getElementById('scoreCouplingCheckbox').checked;
            const currentPage = document.getElementById('pageInput').value;
            const currentPerPage = document.getElementById('perPageSelect').value;

            // Populate sort dropdown
            const sortSelect = document.getElementById('sortBySelect');
            sortSelect.innerHTML = '';
            allResultColumns.forEach(col => {
                const option = document.createElement('option');
                option.value = col;
                option.textContent = col.replace('_', ' ').toUpperCase();
                // Restore previous selection or default to overall_score
                if (col === currentSortBy || (col === 'overall_score' && !currentSortBy)) {
                    option.selected = true;
                }
                sortSelect.appendChild(option);
            });

            // Only clear filters and reset controls on initial search (not when applying filters)
            if (!document.getElementById('resultControls').classList.contains('hidden')) {
                // This is a filter application, preserve current settings
                document.getElementById('sortAscCheckbox').checked = currentSortAsc;
                document.getElementById('scoreCouplingCheckbox').checked = currentScoreCoupling;
                document.getElementById('pageInput').value = currentPage;
                document.getElementById('perPageSelect').value = currentPerPage;
            } else {
                // This is a new search, reset everything
                document.getElementById('filtersContainer').innerHTML = '';
                document.getElementById('sortAscCheckbox').checked = false;
                document.getElementById('scoreCouplingCheckbox').checked = false;
                document.getElementById('pageInput').value = '1';
                document.getElementById('perPageSelect').value = '10';
            }
        }

        // Add a filter row
        function addFilterRow() {
            const container = document.getElementById('filtersContainer');
            const filterItem = document.createElement('div');
            filterItem.className = 'filter-item';

            // Get already used parameters to prevent duplicates
            const usedParams = Array.from(container.querySelectorAll('.filter-item select')).map(select => select.value).filter(val => val);

            const paramSelect = document.createElement('select');
            paramSelect.innerHTML = '<option value="">Select parameter...</option>';

            // Only show numeric columns for filtering
            allResultColumns.forEach(col => {
                // Only add if not already used AND is a numeric column
                if (!usedParams.includes(col)) {
                    const column = availableColumns.find(c => c.name === col);
                    const isNumeric = column && (
                        column.dtype === 'number' ||
                        column.dtype === 'float' ||
                        column.dtype === 'int' ||
                        column.dtype === 'integer'
                    ) || col.toLowerCase().includes('score'); // Always include score columns even if dtype check fails

                    if (isNumeric) {
                        const option = document.createElement('option');
                        option.value = col;
                        option.textContent = col.replace('_', ' ').toUpperCase();
                        paramSelect.appendChild(option);
                    }
                }
            });

            // Update other filter dropdowns when this one changes
            paramSelect.addEventListener('change', function() {
                updateFilterDropdowns();
            });

            const minInput = document.createElement('input');
            minInput.type = 'number';
            minInput.placeholder = 'Min value';

            const maxInput = document.createElement('input');
            maxInput.type = 'number';
            maxInput.placeholder = 'Max value';

            const removeBtn = document.createElement('button');
            removeBtn.textContent = '×';
            removeBtn.onclick = () => filterItem.remove();

            filterItem.appendChild(paramSelect);

            const controlRow = document.createElement('div');
            controlRow.className = 'filter-controls-row';

            controlRow.appendChild(minInput);
            controlRow.appendChild(maxInput);
            controlRow.appendChild(removeBtn);

            filterItem.appendChild(controlRow);

            container.appendChild(filterItem);
        }

        // Update filter dropdowns to prevent duplicates
        function updateFilterDropdowns() {
            const container = document.getElementById('filtersContainer');
            const allSelects = container.querySelectorAll('.filter-item select');
            const usedParams = Array.from(allSelects).map(select => select.value).filter(val => val);

            allSelects.forEach(select => {
                const currentValue = select.value;
                select.innerHTML = '<option value="">Select parameter...</option>';

                allResultColumns.forEach(col => {
                    // Add option if it's not used elsewhere OR it's the current selection
                    // AND it's a numeric column
                    if (!usedParams.includes(col) || col === currentValue) {
                        const column = availableColumns.find(c => c.name === col);
                        const isNumeric = column && (
                            column.dtype === 'number' ||
                            column.dtype === 'float' ||
                            column.dtype === 'int' ||
                            column.dtype === 'integer'
                        ) || col.toLowerCase().includes('score'); // Always include score columns even if dtype check fails

                        if (isNumeric) {
                            const option = document.createElement('option');
                            option.value = col;
                            option.textContent = col.replace('_', ' ').toUpperCase();
                            if (col === currentValue) option.selected = true;
                            select.appendChild(option);
                        }
                    }
                });
            });
        }

        // Apply filters, sorting, and pagination
        async function applyFilters() {
            if (!currentSessionId) {
                showError('No search session found. Please perform a search first.');
                return;
            }

            // Collect filters
            const filters = [];
            const filterItems = document.querySelectorAll('.filter-item');

            filterItems.forEach(item => {
                const param = item.children[0].value;  // paramSelect still first child

                const controls = item.querySelector('.filter-controls-row'); // find controls row
                const minVal = controls.children[0].value;  // minInput is first child of controls
                const maxVal = controls.children[1].value;  // maxInput second child

                if (param && (minVal || maxVal)) {
                    const filter = { name: param };
                    if (minVal) filter.min_val = parseFloat(minVal);
                    if (maxVal) filter.max_val = parseFloat(maxVal);
                    filters.push(filter);
                }
            });

            // Collect sorting
            const sortBy = document.getElementById('sortBySelect').value;
            const sortAsc = document.getElementById('sortAscCheckbox').checked;
            const scoreCoupling = document.getElementById('scoreCouplingCheckbox').checked;

            // Collect pagination
            const page = parseInt(document.getElementById('pageInput').value) || 1;
            const perPage = parseInt(document.getElementById('perPageSelect').value) || 10;

            const retrieveRequest = {
                session_id: currentSessionId,
                filters: filters,
                sort: {
                    by: sortBy,
                    asc: sortAsc,
                    score_coupling: scoreCoupling
                },
                pagination: {
                    page: page,
                    per_page: perPage
                }
            };

            try {
                document.getElementById('applyFiltersBtn').disabled = true;
                document.getElementById('applyFiltersBtn').textContent = 'Applying...';

                const response = await fetch(`${API_BASE}/search/${currentSessionId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(retrieveRequest)
                });

                const data = await response.json();
                // FIXED: Changed from data.results to data.values
                displayResults(data.values);

            } catch (error) {
                showError('Failed to apply filters: ' + error.message);
            } finally {
                document.getElementById('applyFiltersBtn').disabled = false;
                document.getElementById('applyFiltersBtn').textContent = 'Apply Filters & Sorting';
            }
        }

        // Utility functions
        function showError(message) {
            const existing = document.querySelector('.error');
            if (existing) existing.remove();

            const error = document.createElement('div');
            error.className = 'error';
            error.textContent = message;
            document.querySelector('.content').prepend(error);

            setTimeout(() => error.remove(), 5000);
        }

        function showSuccess(message) {
            const existing = document.querySelector('.success');
            if (existing) existing.remove();

            const success = document.createElement('div');
            success.className = 'success';
            success.textContent = message;
            document.querySelector('.content').prepend(success);

            setTimeout(() => success.remove(), 5000);
        }

        // Event listeners
        document.getElementById('solutionSelect').addEventListener('change', function(e) {
            currentSolution = e.target.value;
            if (currentSolution) {
                loadSystems(currentSolution);
            } else {
                resetSystemAndBelow();
            }
        });

        document.getElementById('systemSelect').addEventListener('change', function(e) {
            currentSystem = e.target.value;
            if (currentSystem) {
                loadParameters(currentSolution, currentSystem);
            } else {
                resetResultsAndBelow();
            }
        });

        document.getElementById('addSpecBtn').addEventListener('click', addSpecificationRow);
        document.getElementById('addKwargBtn').addEventListener('click', addKwargRow);
        document.getElementById('searchBtn').addEventListener('click', performSearch);
        document.getElementById('addFilterBtn').addEventListener('click', addFilterRow);
        document.getElementById('applyFiltersBtn').addEventListener('click', applyFilters);

        // Initialize the app
        init();
    </script>
</body>
</html>
